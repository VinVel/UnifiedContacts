name: Android CI
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 11
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'oracle'
          cache: gradle
      - name: Build with Gradle
        run: ./gradlew --no-daemon assembleDebug --stacktrace